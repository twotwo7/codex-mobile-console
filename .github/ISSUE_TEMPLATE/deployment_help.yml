name: Deployment help
description: Ask for help installing, updating, or exposing the app safely.
title: "[Deploy]: "
labels: ["deployment"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste passwords, tokens, private keys, or full customer/project data.
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Node version:
        Codex version:
        Install method:
        Reverse proxy:
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What deployment step failed?
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands and output
      description: Remove secrets before posting.
      render: shell
  - type: textarea
    id: proxy
    attributes:
      label: Reverse proxy or HTTPS config
      description: Optional. Remove domain-private details if needed.
      render: shell
