name: Bug report
description: Report a reproducible problem in Codex Mobile Console.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it without access to your server.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The top status icon still shows running after Codex finishes...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open a session
        2. Send ...
        3. Wait until ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2 / main / commit hash
  - type: dropdown
    id: device
    attributes:
      label: Client device
      options:
        - Android phone
        - iPhone
        - Desktop browser
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Remove secrets, passwords, tokens, project-private content, and customer data.
      render: shell
