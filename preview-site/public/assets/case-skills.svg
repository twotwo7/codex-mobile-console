<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 700" role="img" aria-labelledby="title desc">
  <title id="title">Codex Skill 管理案例</title>
  <desc id="desc">展示 Skill 列表、中文概要、版本变更提示和快捷使用。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2630"/>
      <stop offset="0.58" stop-color="#0f1318"/>
      <stop offset="1" stop-color="#18262d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="1050" height="700" rx="34" fill="url(#bg)"/>
  <g transform="translate(70 62)">
    <text x="0" y="0" fill="#82aaff" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="18" font-weight="900">SKILL LIBRARY</text>
    <text x="0" y="58" fill="#f5f7f2" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="48" font-weight="900">把可复用能力放进侧边栏。</text>
    <text x="0" y="102" fill="#aeb7b6" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="22">列表异步扫描，详情可读，输入时快速带入。</text>
  </g>

  <g transform="translate(86 202)" filter="url(#shadow)">
    <rect width="874" height="388" rx="30" fill="#10161d" stroke="#ffffff" stroke-opacity=".13"/>
    <g transform="translate(28 28)">
      <rect width="286" height="332" rx="22" fill="#151d25"/>
      <text x="22" y="42" fill="#f5f7f2" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="24" font-weight="900">Skill 管理</text>
      <g transform="translate(22 72)" font-family="Arial, 'Noto Sans CJK SC', sans-serif">
        <rect width="242" height="54" rx="16" fill="#202b36"/>
        <text x="16" y="24" fill="#f5f7f2" font-size="17" font-weight="850">mobile-screenshot-ui</text>
        <text x="16" y="44" fill="#61d7c7" font-size="13">已更新中文概要</text>
        <rect y="68" width="242" height="54" rx="16" fill="#111820"/>
        <text x="16" y="100" fill="#d9e2dc" font-size="17">project-release-ops</text>
        <rect y="136" width="242" height="54" rx="16" fill="#111820"/>
        <text x="16" y="168" fill="#d9e2dc" font-size="17">baseline-ui</text>
        <rect y="204" width="242" height="54" rx="16" fill="#261d22"/>
        <text x="16" y="226" fill="#f5f7f2" font-size="17">frontend-skill</text>
        <text x="16" y="246" fill="#ffb0b6" font-size="13">检测到 md5 变化</text>
      </g>
    </g>

    <g transform="translate(350 28)">
      <text x="0" y="42" fill="#f5f7f2" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="30" font-weight="900">frontend-skill</text>
      <text x="0" y="82" fill="#61d7c7" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="17" font-weight="900">中文概要</text>
      <text x="0" y="118" fill="#d9e2dc" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="21">用于制作官网、落地页和视觉型 Web 页面。</text>
      <text x="0" y="154" fill="#aeb7b6" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="19">强调首屏视觉、少量高质量动效、清晰转化路径。</text>
      <rect x="0" y="190" width="464" height="88" rx="20" fill="#0d1218" stroke="#82aaff" stroke-opacity=".26"/>
      <text x="22" y="225" fill="#82aaff" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="17" font-weight="900">一键复制更新提示词</text>
      <text x="22" y="257" fill="#d9e2dc" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="18">请读取所有变更的 Skill，并更新中文总结字段。</text>
      <rect x="0" y="302" width="168" height="44" rx="22" fill="#61d7c7"/>
      <text x="32" y="330" fill="#062522" font-family="Arial, 'Noto Sans CJK SC', sans-serif" font-size="17" font-weight="900">复制提示词</text>
    </g>
  </g>
</svg>
